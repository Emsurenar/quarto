<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#3e2a18" />
  <title>Quarto – Emreos &amp; Raquel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Startskärm: välj identitet -->
  <section id="lobby" class="screen">
    <h1 class="logo">Quarto <span class="seal">٤</span></h1>
    <p class="tagline">Vem är du?</p>
    <div class="identity-buttons">
      <button class="identity" data-player="Emreos">
        <img src="emrico.jpg" alt="Emreos" class="profile-img-lobby" />
        <span>Emreos</span>
      </button>
      <button class="identity" data-player="Raquel">
        <img src="raquel.jpg" alt="Raquel" class="profile-img-lobby" />
        <span>Raquel</span>
      </button>
    </div>
  </section>

  <!-- Spelskärm -->
  <section id="game" class="screen hidden">
    <header>
      <div class="header-row">
        <h1 class="logo small">Quarto <span class="seal">٤</span></h1>
        <div class="header-buttons">
          <button id="reset-scores-btn" title="Nollställ poäng">⟲</button>
          <button id="switch-player" title="Byt spelare">⇄</button>
        </div>
      </div>
      <div class="players-display">
        <div class="player-card" id="card-Emreos">
          <div class="avatar-wrap">
            <img src="emrico.jpg" alt="Emreos" class="avatar" />
            <span class="status-dot dot offline"></span>
          </div>
          <span class="name">Emreos</span>
        </div>
        <span id="score" class="score">0 – 0</span>
        <div class="player-card" id="card-Raquel">
          <div class="avatar-wrap">
            <img src="raquel.jpg" alt="Raquel" class="avatar" />
            <span class="status-dot dot offline"></span>
          </div>
          <span class="name">Raquel</span>
        </div>
      </div>
    </header>

    <p id="action-text" class="action-text"></p>

    <div id="board" class="board"></div>

    <div id="hand" class="hand hidden">
      <span id="hand-piece"></span>
      <div class="hand-info">
        <span id="hand-label"></span>
        <span id="hand-name" class="hand-name"></span>
      </div>
    </div>

    <div class="pool-wrap">
      <p class="pool-label">Kvarvarande pjäser</p>
      <div id="pool" class="pool"></div>
    </div>

    <div class="actions">
      <button id="quarto-btn" class="quarto-btn hidden">Quarto!</button>
      <button id="draw-btn" class="secondary-btn hidden">Avsluta oavgjort</button>
      <button id="new-game-btn" class="secondary-btn hidden">Nytt parti</button>
    </div>

    <div id="banner" class="banner hidden"></div>
  </section>

  <div id="turn-banner" class="turn-banner hidden"></div>
  <canvas id="confetti-canvas" class="confetti-canvas"></canvas>
  <div id="toast" class="toast hidden"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
